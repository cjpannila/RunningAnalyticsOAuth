<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization Complete</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
        }

        h2 {
            font-size: 3rem;
            color: #28a745;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.6rem;
            line-height: 1.6;
            margin: 12px 0;
        }

        @media (max-width: 600px) {
            h2 {
                font-size: 2.5rem;
            }

            p {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>✅ Thank You!</h2>
    <p>You have successfully authorized the application.</p>
    <p>You may now close this window.</p>
</div>

</body>
</html>
